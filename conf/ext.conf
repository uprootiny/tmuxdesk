# tmuxdesk extensions — fzf features, fleet ops, presets, TPM
#
# Loaded by tmux.base.conf if this file exists.
# Delete or rename this file to run with core-only config.

# ─── Fuzzy navigation (requires fzf) ─────────────────────────────────────

bind-key f display-popup -E -w 92% -h 88% '#{@tmuxdesk_dir}/bin/fuzzy-session-pane.sh'
bind-key G display-popup -E -w 92% -h 88% '#{@tmuxdesk_dir}/bin/fleet-search.sh'
bind-key P display-popup -E -w 60% -h 40% \
  'for f in #{@tmuxdesk_dir}/presets/*.sh; do basename "$f" .sh; done | fzf --prompt="⊞ preset> " | while read p; do "#{@tmuxdesk_dir}/presets/${p}.sh"; done'

# ─── Fleet operations (SSH to peers) ─────────────────────────────────────

bind-key F display-popup -E -w 70% -h 50% '#{@tmuxdesk_dir}/bin/fleet-health.sh'
bind-key B display-popup -E -w 80% -h 70% '#{@tmuxdesk_dir}/bin/fleet-broadcast.sh'

# ─── Session persistence (TPM) ───────────────────────────────────────────
# Requires: git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-save-shell-history 'on'
set -g @resurrect-processes ':all:'
set -g @continuum-save-interval '5'
set -g @continuum-restore 'on'
set -g @continuum-boot 'off'
run '~/.tmux/plugins/tpm/tpm'
