# finml — ☰ finance/ML compute node
set -g @host_sigil "☰"
set -g @host_name "finml"

# GPU utilization in status (degrades gracefully if no nvidia-smi)
set -ga status-right ' #[fg=colour244]│ #[fg=colour214]⊿ #(nvidia-smi --query-gpu=utilization.gpu,temperature.gpu --format=csv,noheader,nounits 2>/dev/null | awk -F", " "{printf \"%%s%%%% %%s°C\", \$1, \$2}" || echo "no-gpu")'

# Load average — useful for compute-heavy workloads
set -ga status-right ' #[fg=colour244]│ #[fg=colour109]λ #(awk "{printf \"%%s\", \$1}" /proc/loadavg 2>/dev/null || uptime | sed "s/.*load average: //" | cut -d, -f1)'

# Session persistence (TPM)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-save-shell-history 'on'
set -g @resurrect-processes ':all:'
set -g @continuum-save-interval '5'
set -g @continuum-restore 'on'
set -g @continuum-boot 'off'
run '~/.tmux/plugins/tpm/tpm'
