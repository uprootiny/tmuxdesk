# hub2 — ∴ repo host, coordination node
set -g @host_sigil "∴"
set -g @host_name "hub2"

# Coordination hub: show git branch of tmuxdesk repo in status
set -ga status-right ' #[fg=colour244]│ #[fg=colour136]⊢ #(cd @tmuxdesk@ && git rev-parse --abbrev-ref HEAD 2>/dev/null || echo "−")'

# Fleet health shortcut also available via Prefix+F (base.conf)
# hub2-specific: auto-announce more frequently as the coordination node
set -g status-interval 3

# Session persistence (TPM)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-save-shell-history 'on'
set -g @resurrect-processes ':all:'
set -g @continuum-save-interval '5'
set -g @continuum-restore 'on'
set -g @continuum-boot 'off'
run '~/.tmux/plugins/tpm/tpm'
