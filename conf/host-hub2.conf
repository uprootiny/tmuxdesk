# hub2 — ∴ repo host, coordination node
set -g @host_sigil "∴"
set -g @host_name "hub2"

# Coordination hub: show git branch of tmuxdesk repo in status
set -ga status-right ' #[fg=colour244]│ #[fg=colour136]⊢ #(cd #{@tmuxdesk_dir} && git rev-parse --abbrev-ref HEAD 2>/dev/null || echo "−")'

# Fleet health shortcut also available via Prefix+F (base.conf)
# hub2-specific: auto-announce more frequently as the coordination node
set -g status-interval 3
