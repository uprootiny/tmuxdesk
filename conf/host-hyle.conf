# hyle — primary creative/ops node
set -g @host_sigil "🜂"
set -g @host_name "hyle"

# Deskfloor integration (hyle-specific) — appended to base status-right
set -ga status-right ' #[fg=colour244]| #[fg=colour82]#(~/deskfloor/bin/deskfloor-status)'

# TPM — tmux plugin manager
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Resurrect settings
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-save-shell-history 'on'
set -g @resurrect-processes ':all:'

# Continuum settings
set -g @continuum-save-interval '5'
set -g @continuum-restore 'on'
set -g @continuum-boot 'off'
# continuum_status is added by the plugin itself via run-shell; don't duplicate
# set -ga status-right ' #[fg=colour136]#{continuum_status}'

# Initialize TPM (keep at very bottom)
run '~/.tmux/plugins/tpm/tpm'
