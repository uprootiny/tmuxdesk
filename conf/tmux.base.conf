# tmuxdesk base config — sourced by all fleet nodes
# Per-host overrides follow via host-<name>.conf

# === Terminal ===
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ',xterm-256color:Tc,alacritty:Tc,*:smcup@:rmcup@'
set -g history-limit 200000
set -g escape-time 0
set -g focus-events on
set -g mouse off
setw -g mode-keys vi

# === Numbering ===
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# === Session logging ===
run-shell "mkdir -p ~/tmux-logs"
set-hook -g after-new-session 'run-shell "tmux pipe-pane -o \"cat >> ~/tmux-logs/#S-#{start_time}.log\""'

# === Pane borders ===
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour45"
set -g display-panes-time 2000

# === Status bar foundation ===
set -g status on
set -g status-interval 5
set -g status-left-length 40
set -g status-right-length 100
set -g status-style "bg=colour235,fg=colour250"
set -g message-style "bg=colour237,fg=colour223"
set -g message-command-style "bg=colour237,fg=colour45"

# Left: local sigil + session via sigil-status.sh
set -g status-left '#[fg=colour45,bold]#(~/.tmux/tmuxdesk/bin/sigil-status.sh) #[fg=colour39]#S #[default]'

# Right: mesh fleet status + window position + time
set -g status-right '#[fg=colour244]#(~/.tmux/tmuxdesk/bin/mesh-status.sh) #[fg=colour238]│ #[fg=colour39]#I/#{session_windows} #[fg=colour238]│ #[fg=colour223]%b %d %H:%M'

# Window tabs
setw -g window-status-format '#[fg=colour244,bg=colour235] #I:#W '
setw -g window-status-current-format '#[fg=colour45,bg=colour236,bold] #I:#W '
setw -g window-status-separator ''

# === Vi copy mode ===
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi Escape send-keys -X cancel

# === Pane navigation (vi-style) ===
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Pane resize (Prefix + H/J/K/L)
bind-key -r H resize-pane -L 5
bind-key -r J resize-pane -D 5
bind-key -r K resize-pane -U 5

# Split panes with intuitive keys
bind-key | split-window -h -c "#{pane_current_path}"
bind-key - split-window -v -c "#{pane_current_path}"

# New window inherits cwd
bind-key c new-window -c "#{pane_current_path}"

# === Key bindings ===
# Reload config (Prefix+r)
bind-key r source-file ~/.tmux.conf \; display-message "⟳ config reloaded"

# Toggle mouse (Prefix+m)
bind-key m set -g mouse \; display-message "mouse: #{?mouse,on,off}"

# Session tree
bind-key s choose-tree -Zs

# Fuzzy session/pane jumper (Prefix+f)
bind-key f display-popup -E -w 92% -h 88% '~/.tmux/tmuxdesk/bin/fuzzy-session-pane.sh'

# Layout cycling (Prefix+Tab / Prefix+L)
bind-key Tab run-shell '~/.tmux/tmuxdesk/bin/layout-cycle.sh next'
bind-key L run-shell '~/.tmux/tmuxdesk/bin/layout-cycle.sh prev'

# Session-on-demand (Prefix+S → type name → select or create)
bind-key S command-prompt -p "⊕ session:" "run-shell '~/.tmux/tmuxdesk/bin/session-ensure.sh \"%%\"'"

# Preset picker (Prefix+P)
bind-key P display-popup -E -w 60% -h 40% \
  'ls ~/.tmux/tmuxdesk/presets/*.sh 2>/dev/null | xargs -I{} basename {} .sh | fzf --prompt="⊞ preset> " | xargs -I{} ~/.tmux/tmuxdesk/presets/{}.sh'

# Fleet health popup (Prefix+F)
bind-key F display-popup -E -w 70% -h 50% '~/.tmux/tmuxdesk/bin/fleet-health.sh'

# Fleet broadcast (Prefix+B — run a command on all nodes)
bind-key B display-popup -E -w 80% -h 70% '~/.tmux/tmuxdesk/bin/fleet-broadcast.sh'

# === Mesh hooks ===
set-hook -g session-created 'run-shell -b "~/.tmux/tmuxdesk/bin/mesh-announce.sh &"'
set-hook -g session-closed  'run-shell -b "~/.tmux/tmuxdesk/bin/mesh-announce.sh &"'
