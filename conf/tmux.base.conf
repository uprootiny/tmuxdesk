# tmuxdesk base config — sourced by all fleet nodes
# Per-host overrides follow via host-<name>.conf
#
# This file contains the functional core: terminal settings, navigation,
# status bar with mesh awareness, and session hooks.
#
# Extensions (fzf features, fleet ops, presets, TPM) are loaded from
# ext.conf if present. Override @tmuxdesk_dir before sourcing to
# change the install location.

# === Install location ===
if-shell '[ -z "$(tmux show -gqv @tmuxdesk_dir)" ]' \
  'run-shell "tmux set -g @tmuxdesk_dir \"$HOME/.tmux/tmuxdesk\""'

# ─── Core: Terminal ──────────────────────────────────────────────────────

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ',xterm-256color:Tc,alacritty:Tc,*:smcup@:rmcup@'
set -g history-limit 200000
set -g escape-time 0
set -g focus-events on
set -g mouse off
setw -g mode-keys vi

# ─── Core: Numbering ─────────────────────────────────────────────────────

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ─── Core: Session logging ───────────────────────────────────────────────

run-shell "mkdir -p ~/tmux-logs"
set-hook -g after-new-session 'run-shell "tmux pipe-pane -o \"cat >> ~/tmux-logs/#S-#{start_time}.log\""'

# ─── Core: Appearance ────────────────────────────────────────────────────

set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour45"
set -g display-panes-time 2000

set -g status on
set -g status-interval 5
set -g status-left-length 40
set -g status-right-length 100
set -g status-style "bg=colour235,fg=colour250"
set -g message-style "bg=colour237,fg=colour223"
set -g message-command-style "bg=colour237,fg=colour45"

set -g status-left '#[fg=colour45,bold]#(#{@tmuxdesk_dir}/bin/sigil-status.sh) #[fg=colour39]#S #[default]'
set -g status-right '#[fg=colour244]#(#{@tmuxdesk_dir}/bin/mesh-status.sh) #[fg=colour238]│ #[fg=colour39]#I/#{session_windows} #[fg=colour238]│ #[fg=colour223]%b %d %H:%M'

setw -g window-status-format '#[fg=colour244,bg=colour235] #I:#W '
setw -g window-status-current-format '#[fg=colour45,bg=colour236,bold] #I:#W '
setw -g window-status-separator ''

# ─── Core: Vi copy mode ──────────────────────────────────────────────────

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi Escape send-keys -X cancel

# ─── Core: Navigation ────────────────────────────────────────────────────

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

bind-key -r H resize-pane -L 5
bind-key -r J resize-pane -D 5
bind-key -r K resize-pane -U 5

bind-key | split-window -h -c "#{pane_current_path}"
bind-key - split-window -v -c "#{pane_current_path}"
bind-key c new-window -c "#{pane_current_path}"

# ─── Core: Session management ────────────────────────────────────────────

bind-key r source-file ~/.tmux.conf \; display-message "⟳ config reloaded"
bind-key m set -g mouse \; display-message "mouse: #{?mouse,on,off}"
bind-key s choose-tree -Zs
bind-key S command-prompt -p "⊕ session:" "run-shell '#{@tmuxdesk_dir}/bin/session-ensure.sh \"%%\"'"

bind-key Tab run-shell '#{@tmuxdesk_dir}/bin/layout-cycle.sh next'
bind-key M-l run-shell '#{@tmuxdesk_dir}/bin/layout-cycle.sh prev'

# ─── Core: Mesh hooks ────────────────────────────────────────────────────

set-hook -g session-created 'run-shell -b "#{@tmuxdesk_dir}/bin/mesh-announce.sh &"'
set-hook -g session-closed  'run-shell -b "#{@tmuxdesk_dir}/bin/mesh-announce.sh &"'

# ─── Extensions ──────────────────────────────────────────────────────────
# Loaded if ext.conf exists. Contains: fzf features (fuzzy jumper, project
# search, preset picker), fleet ops (health, broadcast), and TPM plugins.

if-shell '[ -f "#{@tmuxdesk_dir}/conf/ext.conf" ]' \
  'source-file "#{@tmuxdesk_dir}/conf/ext.conf"'
