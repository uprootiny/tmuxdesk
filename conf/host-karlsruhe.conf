# karlsruhe — ∞ NixOS node, infinite reproducibility
set -g @host_sigil "∞"
set -g @host_name "karlsruhe"

# NixOS generation in status (shows current system generation number)
set -ga status-right ' #[fg=colour244]│ #[fg=colour183]∂ #(readlink /nix/var/nix/profiles/system 2>/dev/null | grep -oP "system-\K[0-9]+" || echo "−")'

# Nix store path count (fast: just counts symlinks in profiles, not du)
set -ga status-right ' #[fg=colour244]│ #[fg=colour108]∫ #(ls /nix/var/nix/profiles/ 2>/dev/null | wc -l || echo "−")p'

# Session persistence (TPM)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-save-shell-history 'on'
set -g @resurrect-processes ':all:'
set -g @continuum-save-interval '5'
set -g @continuum-restore 'on'
set -g @continuum-boot 'off'
run '~/.tmux/plugins/tpm/tpm'
