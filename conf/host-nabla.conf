# nabla — ∇ GCP compute node (gradient/del operator)
set -g @host_sigil "∇"
set -g @host_name "nabla"

# GCP metadata: zone + machine type (degrades gracefully outside GCP)
set -ga status-right ' #[fg=colour244]│ #[fg=colour147]∇ #(curl -s -H "Metadata-Flavor: Google" http://metadata.google.internal/computeMetadata/v1/instance/zone 2>/dev/null | awk -F/ "{print \$NF}" || echo "−")'

# Load average
set -ga status-right ' #[fg=colour244]│ #[fg=colour109]λ #(awk "{printf \"%%s\", \$1}" /proc/loadavg 2>/dev/null || echo "−")'

# Session persistence (TPM)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-save-shell-history 'on'
set -g @resurrect-processes ':all:'
set -g @continuum-save-interval '5'
set -g @continuum-restore 'on'
set -g @continuum-boot 'off'
run '~/.tmux/plugins/tpm/tpm'
