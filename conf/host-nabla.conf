# nabla — ∇ GCP compute node (gradient/del operator)
set -g @host_sigil "∇"
set -g @host_name "nabla"

# GCP metadata: zone + machine type (degrades gracefully outside GCP)
set -ga status-right ' #[fg=colour244]│ #[fg=colour147]∇ #(curl -s -H "Metadata-Flavor: Google" http://metadata.google.internal/computeMetadata/v1/instance/zone 2>/dev/null | awk -F/ "{print \$NF}" || echo "−")'

# Load average
set -ga status-right ' #[fg=colour244]│ #[fg=colour109]λ #(awk "{printf \"%%s\", \$1}" /proc/loadavg 2>/dev/null || echo "−")'
